{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">GIS Analytics & AI Insights</h1>
        <p class="page-subtitle">Historical trip data, demand forecasting, and hotspot detection.</p>
    </div>
</div>

<div class="grid grid-cols-2 gap-6 mt-4">
    <!-- Map Container -->
    <div class="col-span-2">
        <div class="card">
            <div class="card-header flex justify-between items-center">
                <h3><i class="fa-solid fa-map-location-dot"></i> Heatmap & Hotspots</h3>
                <div class="flex gap-2">
                    <button class="btn btn-sm btn-secondary" onclick="loadHotspots()"><i class="fa-solid fa-fire"></i> Show AI Hotspots</button>
                    <button class="btn btn-sm btn-secondary" onclick="loadTrips()"><i class="fa-solid fa-route"></i> Show Trips</button>
                </div>
            </div>
            <div id="analytics-map" style="height: 500px; border-radius: 0 0 12px 12px; z-index: 1;"></div>
        </div>
    </div>
    
    <!-- AI Forecast -->
    <div class="card">
        <div class="card-header">
            <h3><i class="fa-solid fa-chart-line"></i> 7-Day Demand Forecast</h3>
        </div>
        <div class="p-4" id="forecast-container">
            <p class="text-gray text-center py-4"><i class="fa-solid fa-spinner fa-spin"></i> Loading ML forecast...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/map_core.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const mapCore = new GeoMedMap('analytics-map');
        window.mapCore = mapCore;
        
        // Load ML Forecast
        fetch('/api/ml/forecast')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('forecast-container');
                if(data.error) {
                    container.innerHTML = `<div class="alert-danger p-3 rounded">${data.error}</div>`;
                    return;
                }
                
                let html = '<div class="forecast-grid">';
                data.forEach(d => {
                    const dateObj = new Date(d.date);
                    const day = dateObj.toLocaleDateString('en-US', {weekday: 'short'});
                    html += `
                        <div class="text-center p-3 border rounded ${d.is_weekend ? 'bg-gray-50' : ''}">
                            <div class="text-sm text-gray font-bold">${day}</div>
                            <div class="text-xl font-bold text-blue-600 my-2">${d.expected_requests}</div>
                            <div class="text-xs text-gray">Calls</div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            });
    });
    
    function loadHotspots() {
        fetch('/api/ml/hotspots')
            .then(r => r.json())
            .then(data => {
                if(data.error) return alert(data.error);
                window.mapCore.updateHotspots(data);
            });
    }
    
    function loadTrips() {
        fetch('/api/trips')
            .then(r => r.json())
            .then(data => {
                if(data.error) return alert(data.error);
                // Implementation to draw historical routes
                data.forEach(trip => {
                    if(trip.route_geometry) {
                        try {
                            const geom = JSON.parse(trip.route_geometry);
                            if(geom && geom.length > 0) {
                                L.polyline(geom, {color: 'blue', weight: 3, opacity: 0.5}).addTo(window.mapCore.map);
                            }
                        } catch(e) {}
                    }
                });
            });
    }
</script>
<style>
.forecast-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
</style>
{% endblock %}
