version: '3.8'

services:
  web:
    build: .
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://geomed_user:geomed_pass@db:5432/geomed_db
      - ORS_API_KEY=${ORS_API_KEY}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=geomed_user
      - POSTGRES_PASSWORD=geomed_pass
      - POSTGRES_DB=geomed_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
